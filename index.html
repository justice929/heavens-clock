<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <script src="js/web-guard.js"></script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#000000">
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="apple-touch-icon" href="icon.svg">
  <title>Heaven's Clock</title>
  <style>
    :root {
      --size: min(88vmin, 640px);
      --ease-mood: 1.4s cubic-bezier(0.4, 0, 0.2, 1);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html {
      color-scheme: dark;
    }

    html, body {
      height: 100%;
      overflow: hidden;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--bg);
      color: var(--fg);
      font-family: var(--font-body);
      padding:
        env(safe-area-inset-top)
        env(safe-area-inset-right)
        env(safe-area-inset-bottom)
        env(safe-area-inset-left);
      transition:
        background var(--ease-mood),
        color var(--ease-mood);
    }

    body[data-mood="calm"] {
      --bg: #07090d;
      --fg: #b8c4d0;
      --dim: rgba(184, 196, 208, 0.45);
      --glow: rgba(140, 170, 200, 0.08);
      --ring-track: rgba(255, 255, 255, 0.04);
      --ring-years: rgba(210, 220, 235, 0.85);
      --ring-days: rgba(170, 195, 220, 0.65);
      --ring-hours: rgba(150, 180, 210, 0.5);
      --ring-minutes: rgba(130, 165, 200, 0.4);
      --ring-seconds: rgba(120, 160, 195, 0.75);
      --panel-border: rgba(255, 255, 255, 0.06);
      --panel-bg: rgba(255, 255, 255, 0.02);
      --text-glow: 0 0 20px rgba(140, 170, 200, 0.15);
      --font-body: "Apple SD Gothic Neo", "Malgun Gothic", "Noto Sans KR", sans-serif;
      --font-digits: "Apple SD Gothic Neo", "Malgun Gothic", sans-serif;
      --grain-opacity: 0.02;
      --vignette: radial-gradient(ellipse 80% 70% at 50% 45%, transparent 40%, rgba(0, 0, 0, 0.55) 100%);
    }

    body[data-mood="impact"] {
      --bg: #000000;
      --fg: #ffffff;
      --dim: rgba(255, 255, 255, 0.4);
      --glow: rgba(255, 255, 255, 0.22);
      --ring-track: rgba(255, 255, 255, 0.06);
      --ring-years: rgba(255, 255, 255, 0.95);
      --ring-days: rgba(255, 255, 255, 0.7);
      --ring-hours: rgba(255, 255, 255, 0.55);
      --ring-minutes: rgba(255, 255, 255, 0.4);
      --ring-seconds: rgba(255, 55, 55, 0.95);
      --panel-border: rgba(255, 255, 255, 0.2);
      --panel-bg: rgba(255, 255, 255, 0.05);
      --text-glow: 0 0 16px rgba(255, 255, 255, 0.5), 0 0 48px rgba(255, 50, 50, 0.2);
      --font-body: "Segoe UI", "Roboto", "Noto Sans KR", sans-serif;
      --font-digits: "Consolas", "Roboto Mono", "Segoe UI", sans-serif;
      --grain-opacity: 0.07;
      --vignette: radial-gradient(ellipse 60% 50% at 50% 50%, rgba(255, 40, 40, 0.06) 0%, transparent 55%);
    }

    body[data-theme="classic"] {
      --bg: #07090d;
      --fg: #e8ecf2;
      --dim: rgba(184, 196, 208, 0.48);
      --glow: rgba(72, 234, 255, 0.16);
      --ring-years: rgba(255, 246, 230, 0.92);
      --ring-days: rgba(72, 234, 255, 0.78);
      --ring-hours: rgba(155, 92, 255, 0.72);
      --ring-minutes: rgba(255, 232, 110, 0.68);
      --ring-seconds: rgba(255, 72, 78, 0.95);
      --panel-border: rgba(72, 234, 255, 0.18);
      --panel-bg: rgba(72, 234, 255, 0.04);
      --text-glow: 0 0 18px rgba(72, 234, 255, 0.35), 0 0 48px rgba(155, 92, 255, 0.15);
      --vignette: radial-gradient(ellipse 80% 70% at 50% 45%, rgba(72, 234, 255, 0.06), transparent 55%);
    }

    body[data-theme="ember"] {
      --bg: #050202;
      --fg: #fff2ec;
      --dim: rgba(255, 210, 195, 0.44);
      --glow: rgba(255, 80, 45, 0.18);
      --ring-years: rgba(255, 238, 225, 0.92);
      --ring-days: rgba(255, 170, 120, 0.7);
      --ring-hours: rgba(255, 120, 85, 0.58);
      --ring-minutes: rgba(255, 95, 70, 0.46);
      --ring-seconds: rgba(255, 65, 45, 0.96);
      --panel-border: rgba(255, 110, 80, 0.22);
      --panel-bg: rgba(255, 80, 45, 0.055);
      --text-glow: 0 0 18px rgba(255, 120, 80, 0.48), 0 0 54px rgba(255, 50, 30, 0.22);
      --vignette: radial-gradient(ellipse 70% 48% at 50% 62%, rgba(255, 50, 30, 0.09), transparent 60%);
    }

    body[data-theme="cosmos"] {
      --bg: #020712;
      --fg: #dcecff;
      --dim: rgba(190, 220, 255, 0.42);
      --glow: rgba(80, 170, 255, 0.17);
      --ring-years: rgba(220, 242, 255, 0.92);
      --ring-days: rgba(135, 215, 255, 0.72);
      --ring-hours: rgba(105, 170, 255, 0.58);
      --ring-minutes: rgba(145, 130, 255, 0.48);
      --ring-seconds: rgba(135, 232, 255, 0.95);
      --panel-border: rgba(120, 200, 255, 0.2);
      --panel-bg: rgba(90, 150, 255, 0.045);
      --text-glow: 0 0 18px rgba(130, 210, 255, 0.42), 0 0 54px rgba(90, 120, 255, 0.18);
      --vignette: radial-gradient(ellipse 80% 62% at 50% 42%, rgba(70, 120, 255, 0.08), transparent 60%);
    }

    body[data-theme="chronograph"] {
      --bg: #070604;
      --fg: #f0e3c2;
      --dim: rgba(230, 210, 170, 0.43);
      --glow: rgba(215, 190, 120, 0.14);
      --ring-years: rgba(255, 244, 210, 0.93);
      --ring-days: rgba(215, 194, 138, 0.75);
      --ring-hours: rgba(190, 165, 105, 0.6);
      --ring-minutes: rgba(165, 140, 90, 0.5);
      --ring-seconds: rgba(255, 220, 140, 0.95);
      --panel-border: rgba(215, 194, 138, 0.22);
      --panel-bg: rgba(215, 194, 138, 0.045);
      --text-glow: 0 0 18px rgba(215, 194, 138, 0.38), 0 0 50px rgba(90, 65, 25, 0.28);
      --vignette: radial-gradient(ellipse 72% 58% at 50% 45%, rgba(215, 194, 138, 0.07), transparent 60%);
    }

    body[data-theme="legacy"] {
      --bg: #050504;
      --fg: #f7ead0;
      --dim: rgba(245, 225, 185, 0.52);
      --glow: rgba(230, 190, 95, 0.18);
      --ring-years: rgba(255, 244, 218, 0.96);
      --ring-days: rgba(235, 203, 135, 0.78);
      --ring-hours: rgba(195, 165, 95, 0.64);
      --ring-minutes: rgba(150, 118, 70, 0.52);
      --ring-seconds: rgba(255, 196, 83, 0.98);
      --panel-border: rgba(235, 197, 118, 0.28);
      --panel-bg: rgba(235, 197, 118, 0.06);
      --text-glow: 0 0 20px rgba(235, 197, 118, 0.45), 0 0 56px rgba(110, 75, 20, 0.32);
      --vignette: radial-gradient(ellipse 75% 58% at 50% 45%, rgba(235, 197, 118, 0.1), transparent 62%);
    }

    body[data-theme="hologram"] {
      --bg: #02030a;
      --fg: #e8fbff;
      --dim: rgba(190, 245, 255, 0.5);
      --glow: rgba(0, 225, 255, 0.24);
      --ring-track: rgba(80, 220, 255, 0.07);
      --ring-years: rgba(175, 248, 255, 0.76);
      --ring-days: rgba(60, 230, 255, 0.78);
      --ring-hours: rgba(170, 90, 255, 0.68);
      --ring-minutes: rgba(255, 70, 240, 0.56);
      --ring-seconds: rgba(60, 245, 255, 0.98);
      --panel-border: rgba(70, 230, 255, 0.26);
      --panel-bg: rgba(40, 180, 255, 0.055);
      --text-glow: 0 0 22px rgba(70, 230, 255, 0.6), 0 0 62px rgba(180, 70, 255, 0.34);
      --vignette: radial-gradient(ellipse 75% 58% at 50% 45%, rgba(60, 220, 255, 0.12), transparent 62%);
    }

    .backdrop {
      position: fixed;
      inset: 0;
      pointer-events: none;
      background: var(--vignette);
      transition: background var(--ease-mood);
    }

    .grain {
      position: fixed;
      inset: 0;
      pointer-events: none;
      opacity: var(--grain-opacity);
      transition: opacity var(--ease-mood);
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    }

    body[data-mood="impact"] .scanlines { opacity: 0.04; }

    .scanlines {
      position: fixed;
      inset: 0;
      pointer-events: none;
      opacity: 0;
      transition: opacity var(--ease-mood);
      background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(255, 255, 255, 0.03) 2px, rgba(255, 255, 255, 0.03) 4px);
    }

    .mood-switch {
      position: fixed;
      top: max(0.72rem, env(safe-area-inset-top));
      left: 50%;
      transform: translateX(-50%);
      z-index: 20;
      max-width: calc(100% - 7.5rem);
      display: flex;
      padding: 3px;
      border-radius: 999px;
      border: 1px solid var(--panel-border);
      background: var(--panel-bg);
      backdrop-filter: blur(8px);
      transition: border-color var(--ease-mood), background var(--ease-mood);
    }

    .theme-switch {
      position: fixed;
      top: calc(max(0.72rem, env(safe-area-inset-top)) + 2.02rem);
      left: 50%;
      transform: translateX(-50%);
      z-index: 10;
      display: flex;
      gap: 0.42rem;
      padding: 0.35rem 0.5rem;
      border: 1px solid var(--panel-border);
      border-radius: 999px;
      background: rgba(0, 0, 0, 0.18);
      backdrop-filter: blur(8px);
      transition: border-color var(--ease-mood), background var(--ease-mood);
    }

    .theme-dot {
      position: relative;
      width: 0.72rem;
      height: 0.72rem;
      border: 1px solid rgba(255, 255, 255, 0.22);
      border-radius: 50%;
      background: var(--theme-accent, #fff);
      cursor: pointer;
      opacity: 0.55;
      transition: opacity 0.2s ease, transform 0.2s ease, box-shadow 0.2s ease;
    }

    .theme-dot.locked {
      opacity: 0.35;
    }

    .mood-switch button.locked {
      opacity: 0.35;
      cursor: not-allowed;
    }

    .mood-switch button.locked::after {
      content: "•";
      margin-left: 0.2rem;
      color: #e8d9b8;
      font-size: 0.55rem;
      vertical-align: super;
    }

    .theme-dot.locked::after {
      content: "•";
      position: absolute;
      right: -0.2rem;
      bottom: -0.2rem;
      width: 0.45rem;
      height: 0.45rem;
      border-radius: 50%;
      background: #e8d9b8;
      color: #05070b;
      font-size: 0.5rem;
      line-height: 0.45rem;
      text-align: center;
      box-shadow: 0 0 10px rgba(232, 217, 184, 0.5);
    }

    .theme-dot[aria-pressed="true"] {
      opacity: 1;
      transform: scale(1.18);
      box-shadow: 0 0 18px var(--theme-accent, rgba(255, 255, 255, 0.4));
    }

    .mood-switch button {
      appearance: none;
      border: none;
      background: transparent;
      color: var(--dim);
      font-family: inherit;
      font-size: 0.72rem;
      font-weight: 500;
      letter-spacing: 0.2em;
      padding: 0.55em 1.2em;
      border-radius: 999px;
      cursor: pointer;
      transition: color 0.35s ease, background 0.35s ease, box-shadow 0.35s ease;
    }

    .mood-switch button[aria-selected="true"] {
      color: var(--fg);
      background: rgba(255, 255, 255, 0.08);
    }

    .lang-toolbar {
      position: fixed;
      top: max(0.72rem, env(safe-area-inset-top));
      left: max(1rem, env(safe-area-inset-left));
      z-index: 10;
    }

    .top-actions {
      position: fixed;
      top: max(0.72rem, env(safe-area-inset-top));
      right: max(1rem, env(safe-area-inset-right));
      z-index: 15;
      display: flex;
      flex-direction: row;
      align-items: center;
      justify-content: flex-end;
      gap: 0.45rem;
    }

    .premium-button,
    .settings-button {
      position: relative;
      top: auto;
      right: auto;
      left: auto;
      flex: 0 0 2.2rem;
      width: 2.2rem;
      height: 2.2rem;
      margin: 0;
      padding: 0;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border: 1px solid var(--panel-border);
      border-radius: 50%;
      background: var(--panel-bg);
      color: var(--dim);
      font-size: 0.95rem;
      line-height: 1;
      cursor: pointer;
      backdrop-filter: blur(8px);
      transition: color 0.35s ease, border-color 0.35s ease, background 0.35s ease;
    }

    .premium-button:hover,
    .settings-button:hover {
      color: var(--fg);
      border-color: rgba(255, 255, 255, 0.28);
    }

    body.is-premium .premium-button {
      color: #e8d9b8;
      border-color: rgba(232, 217, 184, 0.35);
    }

    .lang-toolbar .lang-select {
      width: auto;
      max-width: 6.75rem;
      height: 2.2rem;
      margin: 0;
      padding: 0 0.55rem 0 0.45rem;
      border: 1px solid var(--panel-border);
      border-radius: 999px;
      background: var(--panel-bg);
      color: var(--dim);
      font-family: inherit;
      font-size: 0.68rem;
      letter-spacing: 0.02em;
      cursor: pointer;
      backdrop-filter: blur(8px);
    }

    .lang-toolbar .lang-select:focus {
      outline: none;
      border-color: rgba(255, 255, 255, 0.28);
      color: var(--fg);
    }

    /* Arabic (ar): RTL text is intentional; keep clock + numbers centered/LTR */
    html[dir="rtl"] .lang-toolbar {
      left: max(1rem, env(safe-area-inset-left));
      right: auto;
    }

    html[dir="rtl"] .top-actions {
      right: max(1rem, env(safe-area-inset-right));
      left: auto;
    }

    html[dir="rtl"] .stage,
    html[dir="rtl"] .brand-bar,
    html[dir="rtl"] .daily-quote,
    html[dir="rtl"] .bucket-panel,
    html[dir="rtl"] .footer-line,
    html[dir="rtl"] .mood-hint {
      text-align: center;
    }

    html[dir="rtl"] .clock-wrap,
    html[dir="rtl"] .clock-label,
    html[dir="rtl"] .digits,
    html[dir="rtl"] .mood-switch {
      direction: ltr;
    }

    body[data-mood="impact"] .mood-switch button[aria-selected="true"] {
      background: rgba(255, 255, 255, 0.14);
      box-shadow: 0 0 20px rgba(255, 255, 255, 0.12);
    }

    body[data-mood="calm"] .mood-switch button[aria-selected="true"] {
      background: rgba(140, 170, 200, 0.12);
    }

    .brand-bar {
      text-align: center;
      margin: -0.62rem 0 0;
      padding: 0 0.75rem;
      text-shadow: 0 0 18px var(--glow);
    }

    .brand-bar .app-name {
      font-size: clamp(0.94rem, 2.72vw, 1.22rem);
      letter-spacing: 0.26em;
      color: var(--fg);
      opacity: 0.82;
      font-weight: 600;
    }

    .brand-bar .memento {
      display: block;
      width: 100%;
      margin-top: 0.18em;
      padding: 0.16em 0;
      border: 0;
      background: transparent;
      font: inherit;
      font-size: clamp(1.38rem, 4.65vw, 1.92rem);
      letter-spacing: 0.36em;
      font-weight: 700;
      color: var(--fg);
      cursor: pointer;
      position: relative;
      z-index: 5;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
    }

    .brand-bar .memento:hover {
      opacity: 0.88;
    }

    body[data-mood="impact"] .brand-bar .memento {
      text-shadow: var(--text-glow);
      letter-spacing: 0.38em;
    }

    .daily-quote {
      max-width: min(94vw, 520px);
      text-align: center;
      font-size: clamp(1.02rem, 3.15vw, 1.34rem);
      line-height: 1.82;
      letter-spacing: 0.028em;
      color: var(--fg);
      font-style: italic;
      padding: 1.2rem 1.35rem;
      min-height: 4rem;
      border: 1px solid var(--panel-border);
      border-radius: 22px;
      background: linear-gradient(180deg, var(--panel-bg), rgba(0, 0, 0, 0.08));
      box-shadow: 0 0 28px var(--glow);
      text-wrap: balance;
      transition: color var(--ease-mood), border-color var(--ease-mood), background var(--ease-mood), box-shadow var(--ease-mood);
    }

    .stage {
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: clamp(0.72rem, 2.1vh, 1.55rem);
      padding: 4rem 1.1rem 1.55rem;
      width: 100%;
      max-height: 100dvh;
      overflow-y: auto;
      overscroll-behavior: contain;
      animation: fade-in 1.2s ease-out both;
    }

    .stage::-webkit-scrollbar {
      width: 0;
      height: 0;
    }

    .clock-wrap {
      position: relative;
      width: var(--size);
      height: var(--size);
      /* 마케팅 히어로 mock 기준 폭 300px — 같은 비율로 링·글자 스케일 */
      --clock-scale: calc(var(--size) / 300);
      transition: filter var(--ease-mood);
      isolation: isolate;
    }

    /*
      site/index.html `.clock-demo` 와 같은 마크업·동작·색·속도 (고정 픽셀 값은 scale 로 환산).
    */
    .clock-wrap .clock-demo {
      position: relative;
      width: 100%;
      height: 100%;
      margin: 0;
      aspect-ratio: 1;
      border-radius: 50%;
      background:
        radial-gradient(circle at 50% 50%, rgba(255, 246, 230, 0.13) 0 20%, transparent 22%),
        radial-gradient(circle, rgba(72, 234, 255, 0.1), transparent 66%);
      box-shadow: 0 0 calc(42px * var(--clock-scale)) rgba(72, 234, 255, 0.2);
    }

    html[dir="rtl"] .clock-wrap .clock-demo {
      direction: ltr;
    }

    .clock-wrap .clock-demo > span {
      position: absolute;
      inset: var(--inset);
      border-radius: 50%;
      border: var(--width) solid rgba(255, 246, 230, 0.13);
      transform-origin: 50% 50%;
      pointer-events: none;
      box-sizing: border-box;
    }

    .clock-wrap .clock-demo > span::before {
      content: "";
      position: absolute;
      inset: calc(var(--width) * -1);
      border-radius: 50%;
      border: var(--width) solid transparent;
      border-top-color: var(--color);
      border-right-color: var(--color);
      transform: rotate(var(--rotate));
      filter: drop-shadow(0 0 calc(10px * var(--clock-scale)) var(--color));
      animation: hcSiteRingPulse 5s ease-in-out infinite;
    }

    @keyframes hcSiteRingPulse {
      0%, 100% { opacity: 0.78; }
      50% { opacity: 1; }
    }

    @keyframes hcSiteOrbit {
      to { transform: rotate(360deg); }
    }

    @keyframes hcSiteOrbitReverse {
      to { transform: rotate(-360deg); }
    }

    .clock-wrap .clock-demo .r1 {
      --inset: 0;
      --width: calc(4px * var(--clock-scale));
      --color: rgba(255, 246, 230, 0.95);
      --rotate: 35deg;
      animation: hcSiteOrbit 36s linear infinite;
    }

    .clock-wrap .clock-demo .r2 {
      --inset: calc(100% * 22 / 300);
      --width: calc(3px * var(--clock-scale));
      --color: rgba(72, 234, 255, 0.9);
      --rotate: 120deg;
      animation: hcSiteOrbitReverse 26s linear infinite;
    }

    .clock-wrap .clock-demo .r3 {
      --inset: calc(100% * 46 / 300);
      --width: calc(3px * var(--clock-scale));
      --color: rgba(155, 92, 255, 0.9);
      --rotate: 250deg;
      animation: hcSiteOrbit 18s linear infinite;
    }

    .clock-wrap .clock-demo .r4 {
      --inset: calc(100% * 70 / 300);
      --width: calc(2px * var(--clock-scale));
      --color: rgba(255, 76, 76, 0.95);
      --rotate: 12deg;
      animation: hcSiteOrbitReverse 12s linear infinite;
    }

    body[data-mood="calm"] .clock-wrap {
      animation: breathe 6s ease-in-out infinite;
    }

    body[data-mood="impact"] .clock-wrap.heartbeat {
      animation: heartbeat 0.35s ease-out;
    }

    @keyframes breathe {
      0%, 100% { transform: scale(1); filter: brightness(1); }
      50% { transform: scale(1.012); filter: brightness(1.06); }
    }

    @keyframes heartbeat {
      0% { transform: scale(1); }
      40% { transform: scale(1.018); }
      100% { transform: scale(1); }
    }

    .clock-wrap::before {
      content: "";
      position: absolute;
      inset: 6%;
      border-radius: 50%;
      background: radial-gradient(circle at 50% 44%, rgba(255, 255, 255, 0.028), transparent 58%);
      pointer-events: none;
      opacity: 0.55;
      transition: background var(--ease-mood);
      z-index: 0;
    }

    .clock-wrap::after {
      content: "";
      position: absolute;
      inset: -8%;
      z-index: 0;
      pointer-events: none;
      opacity: 0;
      background: center / contain no-repeat;
      transition: opacity var(--ease-mood), filter var(--ease-mood), transform var(--ease-mood);
    }

    body[data-theme="hologram"] .clock-wrap::after {
      opacity: 0.38;
      background-image: url("assets/skins/hologram-clock.png");
      background-size: 106%;
      filter: saturate(1.18) brightness(1.02) drop-shadow(0 0 26px rgba(0, 225, 255, 0.18));
      mix-blend-mode: screen;
      clip-path: circle(49% at 50% 50%);
      -webkit-mask-image: radial-gradient(circle at 50% 50%, #000 0 58%, rgba(0, 0, 0, 0.88) 66%, transparent 76%);
      mask-image: radial-gradient(circle at 50% 50%, #000 0 58%, rgba(0, 0, 0, 0.88) 66%, transparent 76%);
    }

    .clock-label {
      position: absolute;
      left: 50%;
      top: 50%;
      z-index: 5;
      transform: translate(-50%, -50%);
      text-align: center;
      pointer-events: none;
    }

    /* 히어로 mock `.percent` 타이포에 맞춤 */
    .clock-wrap .clock-demo .clock-label {
      font-variant-numeric: tabular-nums;
    }

    .clock-wrap .clock-demo .clock-label .pct {
      display: block;
      font-family: var(--font-digits);
      font-size: clamp(1.65rem, calc(2.15rem * var(--clock-scale)), 3rem);
      font-weight: 700;
      letter-spacing: -0.04em;
      line-height: 1;
      transition: text-shadow var(--ease-mood);
    }

    body[data-mood="calm"] .clock-wrap .clock-demo .clock-label .pct {
      font-weight: 700;
    }

    body[data-mood="impact"] .clock-wrap .clock-demo .clock-label .pct {
      text-shadow: var(--text-glow);
    }

    .clock-wrap .clock-demo .clock-label .pct-suffix {
      font-size: 0.42em;
      color: var(--dim);
      opacity: 1;
      font-weight: 600;
    }

    .clock-wrap .clock-demo .clock-label .caption {
      display: block;
      margin-top: 0.18rem;
      font-size: clamp(0.45rem, calc(0.5rem * var(--clock-scale)), 0.62rem);
      font-weight: 600;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: var(--dim);
      transition: letter-spacing var(--ease-mood), color var(--ease-mood);
    }

    body[data-mood="calm"] .clock-wrap .clock-demo .clock-label .caption {
      letter-spacing: 0.5em;
    }

    /* 년 · 일 · 시만 숫자로 표시; 분·초 칸 숨김 */
    .unit-minutes,
    .unit-seconds {
      display: none;
    }

    .digits {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: clamp(0.5rem, 2vw, 1rem);
      max-width: 920px;
    }

    .unit {
      --unit-w: clamp(4.2rem, 14vw, 7.5rem);
      width: var(--unit-w);
      text-align: center;
    }

    .unit-face {
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0.2em;
      padding: 0.55em 0.35em 0.45em;
      border: 1px solid var(--panel-border);
      background: linear-gradient(180deg, var(--panel-bg) 0%, transparent 100%);
      transition: border-color var(--ease-mood), box-shadow var(--ease-mood), transform 0.15s ease;
    }

    button.unit-face {
      width: 100%;
      font: inherit;
      color: inherit;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }

    button.unit-face:focus-visible {
      outline: 2px solid var(--fg);
      outline-offset: 3px;
    }

    button.unit-face:active {
      transform: scale(0.98);
    }

    .digits[data-digit-tier="totalDays"] .unit-hours.unit-as-seconds .unit-face {
      border-color: rgba(255, 80, 80, 0.42);
      box-shadow: 0 0 36px rgba(255, 50, 50, 0.14);
    }

    body[data-mood="calm"] .digits[data-digit-tier="totalDays"] .unit-hours.unit-as-seconds .unit-face {
      border-color: rgba(255, 90, 90, 0.32);
      box-shadow: 0 0 28px rgba(255, 60, 60, 0.1);
    }

    .digits[data-digit-tier="totalDays"] .unit-hours.unit-as-seconds .unit-value {
      color: #ff5a5e;
      text-shadow: 0 0 18px rgba(255, 70, 75, 0.35);
    }

    .digits[data-digit-tier="totalDays"] .unit-hours.unit-as-seconds .unit-label {
      color: #ff6b6f;
    }

    body[data-mood="impact"] .digits[data-digit-tier="totalDays"] .unit-hours.unit-as-seconds .unit-value {
      text-shadow: 0 0 20px rgba(255, 80, 85, 0.55), 0 0 48px rgba(255, 50, 50, 0.25);
    }

    /* ⑤ 초 링 — 앱에서만 표시 (웹 시계 연출은 그대로) */
    .clock-ring-sec {
      display: none;
    }

    body[data-mood="calm"] .unit-face::before,
    body[data-mood="calm"] .unit-face::after { display: none; }

    .unit-face::before,
    .unit-face::after {
      content: "";
      position: absolute;
      width: 6px;
      height: 6px;
      border-color: rgba(255, 255, 255, 0.4);
      border-style: solid;
      transition: opacity var(--ease-mood);
    }

    .unit-face::before {
      top: 4px;
      left: 4px;
      border-width: 1px 0 0 1px;
    }

    .unit-face::after {
      bottom: 4px;
      right: 4px;
      border-width: 0 1px 1px 0;
    }

    .unit-value {
      display: block;
      font-family: var(--font-digits);
      font-size: clamp(1.6rem, 5.5vw, 2.8rem);
      font-weight: 500;
      letter-spacing: 0.04em;
      line-height: 1.1;
      font-variant-numeric: tabular-nums;
      text-shadow: var(--text-glow);
      transition: opacity 0.15s ease, transform 0.15s ease, font-weight var(--ease-mood), text-shadow var(--ease-mood);
    }

    body[data-mood="impact"] .unit-value { font-weight: 700; }

    body[data-mood="calm"] .unit-value.tick-flash {
      opacity: 0.88;
      transform: scale(1.01);
    }

    body[data-mood="impact"] .unit-value.tick-flash {
      opacity: 1;
      transform: scale(1.04);
      text-shadow: 0 0 24px rgba(255, 255, 255, 0.9), 0 0 60px rgba(255, 50, 50, 0.45);
    }

    .unit-label {
      display: block;
      margin: 0;
      font-size: clamp(0.5rem, 1.4vw, 0.62rem);
      font-weight: 500;
      letter-spacing: 0.32em;
      line-height: 1;
      transition: color var(--ease-mood), letter-spacing var(--ease-mood);
    }

    body[data-mood="calm"] .unit-label { letter-spacing: 0.38em; }

    /* Unit labels use complementary accents against the dark background. */
    body[data-mood="calm"] .unit-years .unit-label { color: #e8d9b8; }
    body[data-mood="calm"] .unit-days .unit-label { color: #b8dce8; }
    body[data-mood="calm"] .unit-hours .unit-label { color: #b8e8c8; }
    body[data-mood="calm"] .unit-minutes .unit-label { color: #d4b8e8; }
    body[data-mood="calm"] .unit-seconds .unit-label { color: #e8b8b8; }

    body[data-mood="impact"] .unit-years .unit-label { color: #ffe08a; }
    body[data-mood="impact"] .unit-days .unit-label { color: #8ae8ff; }
    body[data-mood="impact"] .unit-hours .unit-label { color: #a8ff8a; }
    body[data-mood="impact"] .unit-minutes .unit-label { color: #e88aff; }
    body[data-mood="impact"] .unit-seconds .unit-label { color: #ff6b6b; }

    body[data-mood="impact"] .unit-seconds .unit-face {
      border-color: rgba(255, 80, 80, 0.35);
      box-shadow: 0 0 40px rgba(255, 50, 50, 0.12);
    }

    body[data-mood="calm"] .unit-seconds .unit-face {
      border-color: rgba(160, 185, 210, 0.2);
      box-shadow: none;
    }

    .footer-line {
      font-size: clamp(0.5rem, 1.4vw, 0.62rem);
      font-weight: 500;
      letter-spacing: 0.22em;
      color: var(--dim);
      text-align: center;
      transition: color var(--ease-mood);
    }

    .bucket-panel {
      width: min(92vw, 520px);
      padding: 0.95rem 1.05rem;
      border: 1px solid var(--panel-border);
      border-radius: 18px;
      background: rgba(0, 0, 0, 0.1);
      box-shadow: none;
      transition: border-color var(--ease-mood), background var(--ease-mood), box-shadow var(--ease-mood);
    }

    .bucket-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0.75rem;
      margin-bottom: 0.38rem;
    }

    .bucket-title {
      margin: 0;
      font-size: clamp(0.76rem, 2.05vw, 0.9rem);
      font-weight: 800;
      letter-spacing: 0.18em;
      color: var(--fg);
      text-transform: uppercase;
    }

    .bucket-count {
      font-size: 0.66rem;
      color: var(--dim);
      font-variant-numeric: tabular-nums;
    }

    .bucket-spotlight {
      min-height: 2.85rem;
      padding: 0.45rem 0.38rem;
      color: var(--fg);
      font-size: clamp(0.82rem, 2.35vw, 1.05rem);
      line-height: 1.42;
      text-align: center;
      overflow-wrap: anywhere;
      overflow: hidden;
      display: -webkit-box;
      -webkit-box-orient: vertical;
      -webkit-line-clamp: 3;
      transition: opacity 0.55s ease, transform 0.55s ease, color var(--ease-mood);
    }

    .bucket-spotlight.swap {
      opacity: 0;
      transform: translateY(6px);
    }

    .bucket-manage {
      display: block;
      margin: 0.26rem auto -0.15rem;
      padding: 0.44rem 0.95rem;
      width: fit-content;
      color: var(--dim);
      font-size: 0.65rem;
      font-weight: 600;
      letter-spacing: 0.14em;
      text-decoration: none;
      text-transform: uppercase;
      transition: color 0.25s ease, opacity 0.25s ease;
    }

    .bucket-manage:hover {
      color: var(--fg);
      opacity: 1;
    }

    .mood-hint {
      font-size: clamp(0.6rem, 1.95vw, 0.82rem);
      letter-spacing: 0.22em;
      color: var(--dim);
      opacity: 0.88;
      text-align: center;
      margin-top: -1.5rem;
    }

    .install-tip[hidden] {
      display: none !important;
    }

    .install-tip:not([hidden]) {
      display: block;
      position: fixed;
      bottom: max(0.75rem, env(safe-area-inset-bottom));
      left: 50%;
      transform: translateX(-50%);
      z-index: 20;
      width: min(92vw, 360px);
      padding: 0.75em 1em;
      border-radius: 12px;
      border: 1px solid var(--panel-border);
      background: rgba(12, 12, 12, 0.92);
      color: var(--fg);
      font-size: 0.68rem;
      line-height: 1.5;
      letter-spacing: 0.04em;
      text-align: center;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
    }

    .install-tip strong {
      display: block;
      margin-bottom: 0.35em;
      font-size: 0.75rem;
      letter-spacing: 0.12em;
    }

    .install-tip p {
      margin: 0;
      color: var(--dim);
    }

    .install-tip-actions {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 0.45rem;
      margin-top: 0.55em;
    }

    .install-tip button {
      padding: 0.4em 1em;
      border: 1px solid var(--panel-border);
      border-radius: 999px;
      background: transparent;
      color: var(--dim);
      font-family: inherit;
      font-size: 0.65rem;
      letter-spacing: 0.15em;
      cursor: pointer;
    }

    #install-action {
      border-color: rgba(232, 217, 184, 0.45);
      color: var(--fg);
    }

    @keyframes fade-in {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 520px) {
      :root {
        --size: min(96vw, 480px);
      }

      .stage {
        gap: 0.7rem;
        padding: 4.38rem 1rem 1.25rem;
      }

      .mood-switch {
        top: max(0.72rem, env(safe-area-inset-top));
      }

      .theme-switch {
        top: calc(max(0.72rem, env(safe-area-inset-top)) + 2.02rem);
      }

      .lang-toolbar {
        top: max(0.72rem, env(safe-area-inset-top));
        left: max(0.75rem, env(safe-area-inset-left));
      }

      .top-actions {
        top: max(0.72rem, env(safe-area-inset-top));
        right: max(0.75rem, env(safe-area-inset-right));
      }

      .clock-wrap .clock-demo .clock-label .pct {
        font-size: clamp(1.35rem, 7vw, 2.35rem);
      }

      .digits {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 0.55rem;
        width: min(94vw, 380px);
        margin: 0 auto;
      }

      .unit {
        width: 100%;
        --unit-w: auto;
      }

      .unit-value {
        font-size: clamp(1.35rem, 6.5vw, 2rem);
      }

      .unit-label {
        letter-spacing: 0.28em;
        font-size: 0.48rem;
      }

      .mood-hint {
        margin-top: 0;
      }

      .bucket-panel {
        width: min(94vw, 520px);
        padding: 0.78rem 0.92rem;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        transition-duration: 0.01ms !important;
      }

      .clock-wrap .clock-demo > span {
        animation: none !important;
      }

      .clock-wrap .clock-demo > span::before {
        animation: none !important;
      }

      body[data-mood="calm"] .clock-wrap {
        animation: none !important;
      }
    }

    /*
      앱(네이티브) 전용 — html.hc-app 은 Capacitor 에서만 붙음.
      브라우저·site 마케팅 시계(.clock-demo 기본 규칙)는 변경하지 않음.
    */
    html.hc-app body[data-theme="void"] .clock-wrap .clock-demo {
      background: radial-gradient(circle at 50% 50%, rgba(255, 255, 255, 0.035) 0 22%, transparent 24%);
      box-shadow: none;
    }

    html.hc-app body[data-theme="void"] .clock-wrap .clock-demo > span {
      border-color: rgba(255, 255, 255, 0.06);
    }

    /*
      WebView: calc(var(--size)/300) 무효 → 궤도 링 두께 0.
      앱에서만 clamp/vmin 으로 ①~④ 링을 다시 그림.
    */
    html.hc-app .clock-wrap .clock-demo > span {
      z-index: 1;
    }

    html.hc-app .clock-wrap .clock-demo .r1 {
      --width: clamp(2.5px, 1.05vmin, 5.5px);
    }

    html.hc-app .clock-wrap .clock-demo .r2 {
      --width: clamp(2px, 0.88vmin, 4.25px);
    }

    html.hc-app .clock-wrap .clock-demo .r3 {
      --width: clamp(2px, 0.88vmin, 4.25px);
    }

    html.hc-app .clock-wrap .clock-demo .r4 {
      --width: clamp(1.5px, 0.72vmin, 3.25px);
    }

    html.hc-app .clock-wrap .clock-demo > span::before {
      filter: drop-shadow(0 0 clamp(3px, 1vmin, 8px) color-mix(in srgb, var(--color) 70%, transparent));
    }

    html.hc-app body[data-theme="void"] .clock-wrap .clock-demo .r1 {
      --color: rgba(210, 218, 228, 0.82);
    }

    html.hc-app body[data-theme="void"] .clock-wrap .clock-demo .r2 {
      --color: rgba(175, 185, 198, 0.68);
    }

    html.hc-app body[data-theme="void"] .clock-wrap .clock-demo .r3 {
      --color: rgba(140, 150, 165, 0.58);
    }

    html.hc-app body[data-theme="void"] .clock-wrap .clock-demo .r4 {
      --color: rgba(105, 115, 130, 0.5);
    }

    html.hc-app .clock-ring-sec {
      position: absolute;
      inset: 0;
      z-index: 3;
      display: block;
      width: 100%;
      height: 100%;
      overflow: visible;
      pointer-events: none;
    }

    html.hc-app .clock-ring-sec .sec-ring-track {
      fill: none;
      stroke: rgba(255, 255, 255, 0.06);
      stroke-width: clamp(1.5px, 0.55vmin, 3px);
      stroke-linecap: round;
    }

    html.hc-app body[data-theme="void"] .clock-ring-sec #sec-ring-arc {
      fill: none;
      stroke: rgba(255, 72, 78, 0.92);
      stroke-width: clamp(2px, 0.72vmin, 3.5px);
      stroke-linecap: butt;
      filter: drop-shadow(0 0 clamp(3px, 1vmin, 8px) rgba(255, 70, 75, 0.45));
    }

    /* ═══ CLASSIC (유료) — 컬러 링 4색 + 빨간 초 ═══ */
    html.hc-app body[data-theme="classic"] .clock-wrap .clock-demo {
      background:
        radial-gradient(circle at 50% 50%, rgba(255, 246, 230, 0.13) 0 20%, transparent 22%),
        radial-gradient(circle, rgba(72, 234, 255, 0.1), transparent 66%);
      box-shadow: 0 0 clamp(16px, 5.5vmin, 48px) rgba(72, 234, 255, 0.22);
    }

    html.hc-app body[data-theme="classic"] .clock-wrap .clock-demo > span {
      border-color: rgba(255, 246, 230, 0.13);
    }

    html.hc-app body[data-theme="classic"] .clock-wrap .clock-demo > span::before {
      border-top-color: var(--color);
      border-right-color: var(--color);
      filter: drop-shadow(0 0 clamp(4px, 1.25vmin, 12px) var(--color));
      animation: hcSiteRingPulse 5s ease-in-out infinite;
    }

    html.hc-app body[data-theme="classic"] .clock-wrap .clock-demo .r1 {
      --color: rgba(255, 246, 230, 0.95);
      animation: hcSiteOrbit 36s linear infinite;
    }

    html.hc-app body[data-theme="classic"] .clock-wrap .clock-demo .r2 {
      --color: rgba(72, 234, 255, 0.9);
      animation: hcSiteOrbitReverse 26s linear infinite;
    }

    html.hc-app body[data-theme="classic"] .clock-wrap .clock-demo .r3 {
      --color: rgba(155, 92, 255, 0.9);
      animation: hcSiteOrbit 18s linear infinite;
    }

    html.hc-app body[data-theme="classic"] .clock-wrap .clock-demo .r4 {
      --color: rgba(255, 232, 110, 0.96);
      animation: hcSiteOrbitReverse 12s linear infinite;
    }

    html.hc-app body[data-theme="classic"] .clock-ring-sec #sec-ring-arc {
      stroke: rgba(255, 72, 78, 0.92);
      filter: drop-shadow(0 0 clamp(3px, 1vmin, 8px) rgba(255, 70, 75, 0.45));
    }

    /* ═══ CHRONOGRAPH (유료) — 크로노 다이얼 · 눈금 · 얇은 브라스 링 ═══ */
    html.hc-app body[data-theme="chronograph"] .clock-wrap .clock-demo {
      background:
        radial-gradient(circle at 50% 50%, rgba(30, 28, 24, 0.95) 0%, rgba(12, 11, 9, 1) 62%, transparent 64%),

      position: absolute;
      inset: 8%;
      border-radius: 50%;
      background: repeating-conic-gradient(

      animation: hcSiteOrbit 55s linear infinite;

    html.hc-app body[data-theme="chronograph"] .clock-wrap .clock-demo .r2 {
      --color: rgba(190, 165, 110, 0.8);
      --width: clamp(1.5px, 0.55vmin, 2.5px);

    html.hc-app body[data-theme="chronograph"] .clock-wrap .clock-demo .r3 {
      --color: rgba(150, 140, 120, 0.72);
      --width: clamp(1.2px, 0.48vmin, 2px);
      animation: hcSiteOrbit 28s linear infinite;

    html.hc-app body[data-theme="chronograph"] .clock-wrap .clock-demo .r4 {

      --width: clamp(1.2px, 0.48vmin, 2px);

    html.hc-app body[data-theme="chronograph"] .clock-wrap .clock-demo > span::before {

    @keyframes hcHoloScan {

      box-shadow:

    }

    html.hc-app body[data-theme="ember"] .clock-wrap .clock-demo .r2 {
      --color: rgba(255, 150, 80, 0.92);
      animation: hcSiteOrbitReverse 20s linear infinite;
    }

    html.hc-app body[data-theme="ember"] .clock-wrap .clock-demo .r3 {
      --color: rgba(255, 85, 50, 0.9);
      animation: hcSiteOrbit 14s linear infinite;
    }

    html.hc-app body[data-theme="ember"] .clock-wrap .clock-demo .r4 {
      --color: rgba(220, 45, 30, 0.88);
      animation: hcSiteOrbitReverse 9s linear infinite;
    }

    html.hc-app body[data-theme="ember"] .clock-wrap .clock-demo > span::before {
      filter: drop-shadow(0 0 clamp(6px, 1.8vmin, 14px) rgba(255, 90, 45, 0.55));
    }

    html.hc-app body[data-theme="ember"] .clock-ring-sec #sec-ring-arc {
      stroke: rgba(255, 95, 55, 0.96);
      filter: drop-shadow(0 0 clamp(4px, 1.2vmin, 10px) rgba(255, 80, 40, 0.6));
    }

    /* ═══ COSMOS (유료) ═══ */
    html.hc-app body[data-theme="cosmos"] .clock-wrap::before {
      inset: -5%;
      background:
        radial-gradient(1px 1px at 20% 30%, rgba(255, 255, 255, 0.5), transparent),
        radial-gradient(1px 1px at 70% 20%, rgba(200, 230, 255, 0.4), transparent),
        radial-gradient(1.5px 1.5px at 55% 75%, rgba(180, 220, 255, 0.35), transparent),
        radial-gradient(1px 1px at 85% 55%, rgba(255, 255, 255, 0.3), transparent);
      opacity: 0.7;
      animation: hcCosmosTwinkle 8s ease-in-out infinite;
    }

    html.hc-app body[data-theme="cosmos"] .clock-wrap .clock-demo {
      background:
        radial-gradient(circle at 35% 35%, rgba(120, 200, 255, 0.2) 0%, transparent 45%),
        radial-gradient(circle at 65% 60%, rgba(100, 80, 255, 0.15) 0%, transparent 50%),
        radial-gradient(circle, rgba(8, 20, 55, 0.9), rgba(2, 8, 25, 0.98) 70%);
      box-shadow: 0 0 clamp(18px, 6vmin, 48px) rgba(80, 150, 255, 0.28);
    }

    html.hc-app body[data-theme="cosmos"] .clock-wrap .clock-demo .r1 {
      --color: rgba(230, 248, 255, 0.9);
      animation: hcSiteOrbit 48s linear infinite;
    }

    html.hc-app body[data-theme="cosmos"] .clock-wrap .clock-demo .r2 {
      --color: rgba(120, 210, 255, 0.88);
      animation: hcSiteOrbitReverse 34s linear infinite;
    }

    html.hc-app body[data-theme="cosmos"] .clock-wrap .clock-demo .r3 {
      --color: rgba(140, 120, 255, 0.85);
      animation: hcSiteOrbit 24s linear infinite;
    }

    html.hc-app body[data-theme="cosmos"] .clock-wrap .clock-demo .r4 {
      --color: rgba(70, 140, 255, 0.82);
      animation: hcSiteOrbitReverse 16s linear infinite;
    }

    html.hc-app body[data-theme="cosmos"] .clock-ring-sec #sec-ring-arc {
      stroke: rgba(100, 220, 255, 0.95);
      filter: drop-shadow(0 0 clamp(4px, 1.2vmin, 12px) rgba(80, 200, 255, 0.5));
    }

    /* ═══ LEGACY (유료) ═══ */
    html.hc-app body[data-theme="legacy"] .clock-wrap .clock-demo {
      background:
        radial-gradient(circle at 50% 38%, rgba(255, 244, 218, 0.12) 0%, transparent 42%),
        radial-gradient(circle, rgba(45, 38, 22, 0.6), rgba(18, 15, 8, 0.92) 68%);
      box-shadow:
        0 0 clamp(16px, 5vmin, 40px) rgba(230, 190, 95, 0.22),
        inset 0 0 clamp(20px, 6vmin, 50px) rgba(235, 197, 118, 0.06);
    }

    html.hc-app body[data-theme="legacy"] .clock-wrap .clock-demo .r1 {
      --color: rgba(255, 244, 218, 0.96);
      --width: clamp(3.5px, 1.25vmin, 6.5px);
      animation: hcSiteOrbit 42s linear infinite;
    }

    html.hc-app body[data-theme="legacy"] .clock-wrap .clock-demo .r2 {
      --color: rgba(235, 200, 120, 0.9);
      --width: clamp(3px, 1.1vmin, 5.5px);
      animation: hcSiteOrbitReverse 30s linear infinite;
    }

    html.hc-app body[data-theme="legacy"] .clock-wrap .clock-demo .r3 {
      --color: rgba(180, 140, 70, 0.85);
      animation: hcSiteOrbit 22s linear infinite;
    }

    html.hc-app body[data-theme="legacy"] .clock-wrap .clock-demo .r4 {
      --color: rgba(255, 230, 180, 0.88);
      animation: hcSiteOrbitReverse 15s linear infinite;
    }

    html.hc-app body[data-theme="legacy"] .clock-wrap .clock-demo .clock-label .pct {
      font-family: Georgia, "Times New Roman", serif;
      font-weight: 600;
    }

    html.hc-app body[data-theme="legacy"] .clock-ring-sec #sec-ring-arc {
      stroke: rgba(255, 196, 83, 0.98);
      filter: drop-shadow(0 0 clamp(5px, 1.5vmin, 12px) rgba(230, 190, 95, 0.45));
    }

    /* ═══ HOLOGRAM (유료) ═══ */
    html.hc-app body[data-theme="hologram"] .clock-wrap::after {
      inset: -6%;
      opacity: 0.65;
      background-image: none;
      background: repeating-linear-gradient(
        0deg,
        transparent 0px,
        transparent 3px,
        rgba(60, 220, 255, 0.04) 3px,
        rgba(60, 220, 255, 0.04) 4px
      );
      mix-blend-mode: screen;
      animation: hcHoloScan 6s linear infinite;
      z-index: 4;
    }

    html.hc-app body[data-theme="hologram"] .clock-wrap .clock-demo {
      background:
        radial-gradient(circle at 50% 50%, rgba(60, 220, 255, 0.08) 0%, transparent 55%),
        radial-gradient(circle, rgba(20, 40, 80, 0.5), rgba(4, 8, 20, 0.95) 70%);
      box-shadow:
        0 0 clamp(20px, 7vmin, 52px) rgba(0, 225, 255, 0.25),
        inset 0 0 clamp(8px, 2.5vmin, 20px) rgba(180, 70, 255, 0.08);
    }

    html.hc-app body[data-theme="hologram"] .clock-wrap .clock-demo .r1 {
      --color: rgba(200, 255, 255, 0.85);
      animation: hcSiteOrbit 32s linear infinite;
    }

    html.hc-app body[data-theme="hologram"] .clock-wrap .clock-demo .r2 {
      --color: rgba(255, 70, 240, 0.82);
      animation: hcSiteOrbitReverse 22s linear infinite;
    }

    html.hc-app body[data-theme="hologram"] .clock-wrap .clock-demo .r3 {
      --color: rgba(60, 245, 255, 0.88);
      animation: hcSiteOrbit 15s linear infinite;
    }

    html.hc-app body[data-theme="hologram"] .clock-wrap .clock-demo .r4 {
      --color: rgba(170, 90, 255, 0.85);
      animation: hcSiteOrbitReverse 10s linear infinite;
    }

    html.hc-app body[data-theme="hologram"] .clock-wrap .clock-demo > span::before {
      animation: hcHoloPulse 2.5s ease-in-out infinite;
      filter: drop-shadow(0 0 clamp(5px, 1.5vmin, 12px) rgba(0, 225, 255, 0.5));
    }

    html.hc-app body[data-theme="hologram"] .clock-wrap .clock-demo .clock-label .pct {
      font-family: "Consolas", monospace;
      color: #d8fcff;
    }

    html.hc-app body[data-theme="hologram"] .clock-ring-sec #sec-ring-arc {
      stroke: rgba(60, 245, 255, 0.98);
      filter: drop-shadow(0 0 clamp(6px, 1.8vmin, 14px) rgba(0, 225, 255, 0.55));
    }
  </style>
</head>
<body data-mood="calm" data-theme="void">
  <div class="backdrop" aria-hidden="true"></div>
  <div class="grain" aria-hidden="true"></div>
  <div class="scanlines" aria-hidden="true"></div>

  <nav class="mood-switch" role="tablist" aria-label="Display mood">
    <button type="button" role="tab" data-mood="calm" aria-selected="true" data-i18n="mood.calm">Calm</button>
    <button type="button" role="tab" data-mood="impact" aria-selected="false" data-i18n="mood.impact">Impact</button>
  </nav>
  <nav class="theme-switch" id="theme-switch" aria-label="Theme selector"></nav>
  <div class="lang-toolbar" aria-label="Language">
    <select class="lang-select" id="app-language" aria-label="Language"></select>
  </div>
  <div class="top-actions" aria-label="App actions">
    <button type="button" class="premium-button" id="open-premium" aria-label="Premium">✦</button>
    <button type="button" class="settings-button" id="edit-settings" aria-label="Edit life settings">⚙</button>
  </div>

  <main class="stage">
    <header class="brand-bar">
      <p class="app-name" data-i18n="appTitle">Heaven's Clock</p>
      <button type="button" class="memento" data-i18n="mementoMori">Memento Mori</button>
    </header>

    <div class="clock-wrap" id="clock-wrap">
      <div class="clock-demo">
        <span class="r1" aria-hidden="true"></span>
        <span class="r2" aria-hidden="true"></span>
        <span class="r3" aria-hidden="true"></span>
        <span class="r4" aria-hidden="true"></span>
        <svg class="clock-ring-sec" viewBox="0 0 200 200" aria-hidden="true">
          <circle class="sec-ring-track" cx="100" cy="100" r="40" />
          <g transform="rotate(-90 100 100)">
            <circle id="sec-ring-arc" cx="100" cy="100" r="40" fill="none" />
          </g>
        </svg>
        <div class="clock-label">
          <span class="pct"><span id="pct-value">—</span><span class="pct-suffix">%</span></span>
          <span class="caption" id="caption" data-i18n="remaining">TIME LEFT</span>
        </div>
      </div>
    </div>

    <div class="digits" id="digits-panel" data-digit-tier="years" aria-live="polite">
      <div class="unit unit-years">
        <button type="button" class="unit-face" id="digit-tier-toggle" aria-pressed="false">
          <span class="unit-value" data-key="years">0</span>
          <span class="unit-label" id="digit-label-1" data-i18n="unit.year">YEAR</span>
        </button>
      </div>
      <div class="unit unit-days">
        <div class="unit-face">
          <span class="unit-value" data-key="days">0</span>
          <span class="unit-label" id="digit-label-2" data-i18n="unit.day">DAY</span>
        </div>
      </div>
      <div class="unit unit-hours" id="digit-slot-3">
        <div class="unit-face">
          <span class="unit-value" data-key="hours">00</span>
          <span class="unit-label" id="digit-label-3" data-i18n="unit.hour">HOUR</span>
        </div>
      </div>
      <div class="unit unit-minutes">
        <div class="unit-face">
          <span class="unit-value" data-key="minutes">00</span>
          <span class="unit-label" data-i18n="unit.min">MIN</span>
        </div>
      </div>
      <div class="unit unit-seconds">
        <div class="unit-face">
          <span class="unit-value" data-key="seconds">00</span>
          <span class="unit-label" data-i18n="unit.sec">SEC</span>
        </div>
      </div>
    </div>

    <p class="daily-quote" id="daily-quote" aria-live="polite"></p>

    <section class="bucket-panel" aria-labelledby="bucket-title">
      <div class="bucket-head">
        <h2 class="bucket-title" id="bucket-title" data-i18n="bucket.today">Today's Bucket</h2>
        <span class="bucket-count" id="bucket-count">0/0</span>
      </div>
      <p class="bucket-spotlight" id="bucket-spotlight" aria-live="polite" data-i18n="bucket.empty">Write one thing you do not want to postpone.</p>
      <a class="bucket-manage" href="bucket.html" data-i18n="bucket.manage">Manage Bucket List</a>
    </section>

    <p class="footer-line"><span data-i18n="target">TARGET</span> <span id="target-label">—</span></p>
    <p class="mood-hint" id="mood-hint">Breathe with the moment</p>
  </main>

  <aside class="install-tip" id="install-tip" hidden>
    <strong id="install-title">Install on this device</strong>
    <p id="install-body"></p>
    <div class="install-tip-actions">
      <button type="button" id="install-action" hidden>Install now</button>
      <button type="button" id="install-dismiss">Close</button>
    </div>
  </aside>

  <script src="js/web-install.js"></script>
  <script src="js/locales-meta.js"></script>
  <script src="js/locale-loader.js"></script>
  <script src="js/billing-bundle.js"></script>
  <script src="js/app-bundle.js"></script>
</body>
</html>
